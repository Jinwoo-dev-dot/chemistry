<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화학 방탈출 🧪</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: #0a0a1a;
    color: #e0e0ff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, #1a0a2e 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #0a1a2e 0%, transparent 60%),
                #0a0a1a;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 880px; margin: 0 auto;
    padding: 20px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ═══ START SCREEN ═══ */
  .start-screen { text-align: center; padding: 40px 20px; }

  .lab-icon {
    font-size: 80px; display: block; margin-bottom: 16px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .game-title {
    font-family: 'Jua', sans-serif; font-size: 42px; color: #7fdfff;
    text-shadow: 0 0 20px rgba(127, 223, 255, 0.4);
    margin-bottom: 8px; line-height: 1.2;
  }

  .game-subtitle { font-size: 15px; color: #8888aa; margin-bottom: 32px; }

  .login-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(127,223,255,0.2);
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 400px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 14px;
  }

  .login-card label { font-size: 13px; color: #8888aa; text-align: left; }

  .login-card input {
    width: 100%; padding: 12px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #fff; font-size: 15px;
    font-family: inherit; outline: none;
  }
  .login-card input:focus { border-color: #7fdfff; }

  .btn-primary {
    padding: 14px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #4fb8ff, #7f6cff);
    color: #fff; font-size: 16px; font-weight: 800;
    font-family: 'Jua', sans-serif; cursor: pointer;
    transition: transform .15s, opacity .15s;
  }
  .btn-primary:hover { transform: translateY(-1px); opacity: 0.95; }
  .btn-primary:active { transform: scale(0.98); }

  .login-status { font-size: 13px; color: #ff8888; min-height: 18px; }

  .role-note {
    font-size: 12.5px; color: #66cc99; line-height: 1.6;
    background: rgba(102,204,153,0.08); border: 1px solid rgba(102,204,153,0.2);
    border-radius: 10px; padding: 10px 12px; text-align: left;
  }

  /* ═══ LOBBY / GAME SCREEN ═══ */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }

  .stage-label { font-family: 'Jua', sans-serif; font-size: 20px; color: #7fdfff; }

  .timer {
    font-family: 'Jua', sans-serif; font-size: 22px;
    background: rgba(255,255,255,0.06); border-radius: 10px;
    padding: 6px 16px; letter-spacing: 1px;
  }
  .timer.low { color: #ff6677; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.4; } }

  .story-box {
    background: rgba(127,223,255,0.06);
    border: 1px solid rgba(127,223,255,0.18);
    border-radius: 14px; padding: 18px; margin-bottom: 16px;
    font-size: 14.5px; line-height: 1.8;
  }

  .role-badge {
    display: inline-block; font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px; margin-bottom: 10px;
    background: rgba(127,223,255,0.15); color: #7fdfff;
    border: 1px solid rgba(127,223,255,0.3);
  }

  .game-layout {
    display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px;
  }
  @media (max-width: 720px) {
    .game-layout { grid-template-columns: 1fr; }
  }

  .main-panel { display: flex; flex-direction: column; gap: 14px; }

  .clue-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 18px;
  }

  .clue-id {
    font-family: 'Jua', sans-serif; font-size: 13px; color: #ffaa44;
    letter-spacing: 1px; margin-bottom: 8px;
  }

  .clue-text { font-size: 15px; line-height: 1.8; }
  .highlight {
    background: rgba(127,223,255,0.18); color: #aef0ff;
    padding: 1px 5px; border-radius: 4px;
  }
  .warn {
    background: rgba(255,170,68,0.18); color: #ffcf99;
    padding: 1px 5px; border-radius: 4px;
  }

  .answer-panel {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 18px;
  }
  .answer-title { font-family: 'Jua', sans-serif; font-size: 15px; color: #aef0ff; margin-bottom: 10px; }
  .answer-row { display: flex; gap: 8px; }
  .answer-input {
    flex: 1; padding: 12px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #fff; font-size: 15px;
    font-family: inherit; outline: none;
  }
  .answer-input:focus { border-color: #7fdfff; }
  .btn-submit {
    padding: 0 22px; border: none; border-radius: 10px;
    background: #4fb8ff; color: #06121f; font-weight: 800;
    font-family: 'Jua', sans-serif; cursor: pointer; font-size: 15px;
  }
  .btn-submit:hover { background: #6fc8ff; }

  .answer-feedback { margin-top: 10px; font-size: 14px; min-height: 20px; }
  .answer-feedback.wrong { color: #ff8888; }
  .answer-feedback.right { color: #88ffaa; }

  /* ═══ ORDERING UI ═══ */
  .order-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .order-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 12px 14px;
    font-size: 14px; line-height: 1.6; cursor: grab;
    display: flex; align-items: center; gap: 10px;
    transition: transform .12s, background .12s;
  }
  .order-card.dragging { opacity: 0.4; }
  .order-card:active { cursor: grabbing; }
  .order-handle { font-size: 16px; color: #8888aa; flex-shrink: 0; }
  .order-num {
    font-family: 'Jua', sans-serif; font-size: 13px; color: #aef0ff;
    background: rgba(127,223,255,0.15); border-radius: 6px;
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ═══ SIDE PANEL ═══ */
  .side-panel { display: flex; flex-direction: column; gap: 14px; }
  .members-section, .chat-section {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 14px;
  }
  .section-label {
    font-size: 12px; color: #8888aa; margin-bottom: 10px;
    letter-spacing: 0.5px; font-weight: 700;
  }
  .member-list { display: flex; flex-direction: column; gap: 8px; }
  .member-chip {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; padding: 6px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.03);
  }
  .member-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .member-role { font-size: 11px; color: #8888aa; margin-left: auto; }

  .chat-section { display: flex; flex-direction: column; }
  .chat-header { font-size: 12px; color: #8888aa; margin-bottom: 8px; font-weight: 700; }
  .chat-messages {
    height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 10px; padding-right: 4px;
  }
  .chat-msg { font-size: 13px; line-height: 1.5; }
  .chat-msg.system { color: #ffaa44; font-style: italic; }
  .msg-meta { display: flex; justify-content: space-between; font-size: 11px; color: #8888aa; }
  .msg-text { word-break: break-word; }
  .chat-input-area { display: flex; gap: 6px; }
  .chat-input {
    flex: 1; padding: 10px 12px; font-size: 13px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: #fff; font-family: inherit; outline: none;
  }
  .chat-input:focus { border-color: #7fdfff; }
  .btn-chat {
    padding: 0 14px; border: none; border-radius: 8px;
    background: rgba(127,223,255,0.2); color: #aef0ff;
    font-weight: 700; cursor: pointer; font-size: 13px;
  }

  /* ═══ OVERLAY ═══ */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(5,5,15,0.92);
    align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.active { display: flex; }
  .overlay-box {
    background: rgba(20,20,40,0.95);
    border: 1px solid rgba(127,223,255,0.3);
    border-radius: 18px; padding: 32px 28px;
    max-width: 480px; text-align: center;
  }
  .overlay-icon { font-size: 56px; display: block; margin-bottom: 12px; }
  .overlay-title { font-family: 'Jua', sans-serif; font-size: 24px; color: #aef0ff; margin-bottom: 8px; }
  .overlay-sub { font-size: 14px; color: #c0c0e0; margin-bottom: 16px; line-height: 1.6; }
  .overlay-fact {
    background: rgba(255,255,255,0.05); border-radius: 10px;
    padding: 14px; font-size: 13.5px; line-height: 1.8;
    color: #d0d0f0; margin-bottom: 20px; text-align: left;
  }
  .overlay-twist {
    background: rgba(255,170,68,0.1); border: 1px solid rgba(255,170,68,0.25);
    border-radius: 10px; padding: 12px; font-size: 13.5px;
    line-height: 1.8; color: #ffd9a8; margin-bottom: 16px; text-align: left;
  }
  .btn-next {
    padding: 12px 28px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #4fb8ff, #7f6cff);
    color: #fff; font-weight: 800; font-family: 'Jua', sans-serif;
    cursor: pointer; font-size: 15px;
  }

  /* ═══ FINAL SCREEN ═══ */
  .final-content { text-align: center; padding: 40px 20px; }
  .final-icon { font-size: 72px; display: block; margin-bottom: 12px; }
  .final-title { font-family: 'Jua', sans-serif; font-size: 36px; color: #aef0ff; margin-bottom: 6px; }
  .final-sub { font-size: 14px; color: #8888aa; margin-bottom: 24px; }
  .final-score-box {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    max-width: 420px; margin: 0 auto 24px;
  }
  .final-stat {
    background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-label { font-size: 12px; color: #8888aa; }
  .stat-val { font-family: 'Jua', sans-serif; font-size: 20px; color: #aef0ff; }
  .btn-restart {
    padding: 12px 28px; border: none; border-radius: 10px;
    background: rgba(255,255,255,0.08); color: #fff;
    font-weight: 700; cursor: pointer; font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">

  <!-- ═══════════════ START / LOGIN ═══════════════ -->
  <div class="screen active" id="screen-start">
    <div class="start-screen">
      <span class="lab-icon">🧪</span>
      <div class="game-title">SECTOR-7 탈출</div>
      <div class="game-subtitle">화학 협동 방탈출 · 2인 1팀</div>
      <div class="login-card">
        <div>
          <label>팀 코드 (같은 팀끼리 동일하게 입력)</label>
          <input id="input-team" placeholder="예: GOLD" maxlength="12" autocomplete="off">
        </div>
        <div>
          <label>닉네임</label>
          <input id="input-nick" placeholder="닉네임 입력" maxlength="10" autocomplete="off">
        </div>
        <button class="btn-primary" onclick="login()">접속하기 🚀</button>
        <div class="login-status" id="login-status"></div>
        <div class="role-note">
          💡 한 팀은 정원 2명입니다. 먼저 접속한 사람이 <b>"승무원 A"</b>, 두 번째 사람이 <b>"승무원 B"</b>가 됩니다.
          각자 화면에 <b>서로 다른 단서</b>가 보이니, 꼭 옆 사람과 이야기하면서 풀어야 해요!
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ GAME SCREEN ═══════════════ -->
  <div class="screen" id="screen-game">
    <div class="top-bar">
      <div class="stage-label" id="stage-label">구역 1: 기압 경보</div>
      <div class="timer" id="timer">05:00</div>
    </div>

    <div class="story-box" id="story-box"></div>

    <div class="game-layout">
      <div class="main-panel">
        <div class="clue-card">
          <span class="role-badge" id="role-badge">승무원 A</span>
          <div class="clue-id" id="clue-id">CLUE-A</div>
          <div class="clue-text" id="clue-text">단서를 불러오는 중...</div>
        </div>
        <div class="answer-panel" id="order-panel" style="display:none;">
          <div class="answer-title">🧩 실험 순서 배열 (드래그해서 순서를 바꾸세요)</div>
          <div class="order-list" id="order-list"></div>
          <button class="btn-submit" style="width:100%; padding:12px;" onclick="submitOrder()">이 순서로 제출</button>
          <div class="answer-feedback" id="order-feedback"></div>
        </div>
        <div class="answer-panel" id="answer-panel-normal">
          <div class="answer-title">🔓 정답 입력</div>
          <div class="answer-row">
            <input class="answer-input" id="answer-input" placeholder="팀원과 토의 후 입력..." autocomplete="off" spellcheck="false">
            <button class="btn-submit" onclick="submitAnswer()">제출</button>
          </div>
          <div class="answer-feedback" id="answer-feedback"></div>
        </div>
      </div>

      <div class="side-panel">
        <div class="members-section">
          <div class="section-label">접속 중인 승무원</div>
          <div class="member-list" id="member-list"></div>
        </div>
        <div class="chat-section">
          <div class="chat-header">팀 채팅 — 단서를 공유하고 토의하세요</div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input-area">
            <input class="chat-input" id="chat-input" placeholder="단서 공유하기...">
            <button class="btn-chat" onclick="sendChat()">전송</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ STAGE CLEAR OVERLAY ═══════════════ -->
  <div class="overlay" id="overlay-clear">
    <div class="overlay-box">
      <span class="overlay-icon" id="ol-icon">✅</span>
      <div class="overlay-title" id="ol-title">구역 돌파!</div>
      <div class="overlay-sub" id="ol-sub"></div>
      <div class="overlay-twist" id="ol-twist" style="display:none;"></div>
      <div class="overlay-fact" id="ol-fact"></div>
      <button class="btn-next" id="btn-next" onclick="nextStage()">다음 구역 진입 ▶</button>
    </div>
  </div>

  <!-- ═══════════════ FINAL ═══════════════ -->
  <div class="screen" id="screen-final">
    <div class="final-content">
      <span class="final-icon">🚀</span>
      <div class="final-title">탈출 성공!</div>
      <div class="final-sub" id="final-team-name">팀 — · MISSION COMPLETE</div>
      <div class="final-score-box" id="final-score-box"></div>
      <button class="btn-restart" onclick="location.reload()">↩ 다시 시작</button>
    </div>
  </div>

</div>

// ═══ STATE ═══
let myTeam = '';
let myNick = '';
let myRole = 0; // 0 = A, 1 = B
let currentStageIdx = 0;
let timerInterval = null;
let timeLeft = 0;
let seenMsgIds = new Set();
let offlineMode = false;
let teamUnsub = null;
let chatUnsub = null;

// ═══ LOGIN ═══
async function login() {
  const team = document.getElementById('input-team').value.trim().toUpperCase();
  const nick = document.getElementById('input-nick').value.trim();
  const status = document.getElementById('login-status');

  if (!team || !nick) {
    status.textContent = '⚠ 팀 코드와 닉네임을 모두 입력해주세요';
    return;
  }

  status.textContent = '접속 중...';

  if (typeof firebase === 'undefined' || !firebaseReady || !db) {
    status.textContent = '⚠ Firebase 라이브러리를 불러오지 못했습니다. 오프라인 모드로 시작합니다.';
    startOfflineMode(team, nick);
    return;
  }

  try {
    myTeam = team;
    myNick = nick;

    const teamRef = db.collection('teams').doc(team);
    const snap = await teamRef.get();

    if (!snap.exists) {
      await teamRef.set({
        stage: 0,
        stageStartTime: Date.now(),
        members: { [nick]: { role: 0, joinedAt: Date.now() } },
        solved: false,
        totalElapsed: 0
      });
      myRole = 0;
    } else {
      const data = snap.data();
      const members = data.members || {};
      if (members[nick] !== undefined) {
        myRole = members[nick].role;
      } else {
        const takenRoles = Object.values(members).map(m => m.role);
        if (takenRoles.length >= 2) {
          status.textContent = '⚠ 이 팀은 이미 2명(A, B)이 모두 접속했습니다. 다른 팀 코드를 사용하세요.';
          return;
        }
        myRole = takenRoles.includes(0) ? 1 : 0;
        await teamRef.update({
          [`members.${nick}`]: { role: myRole, joinedAt: Date.now() }
        });
      }
    }

    showScreen('screen-game');
    initGame();
    status.textContent = '';
  } catch (e) {
    console.error('Login error:', e);
    let detail = e.message || String(e);
    let extra = '';
    if (e.code === 'permission-denied' || /permission/i.test(detail)) {
      extra = ' (Firestore 보안 규칙이 막혀있을 수 있어요. Firebase 콘솔 → Firestore Database → 규칙에서 read/write를 허용해주세요.)';
    } else if (e.code === 'unavailable' || /network|fetch|offline/i.test(detail)) {
      extra = ' (네트워크 연결을 확인해주세요. 오프라인 모드로 1인 플레이를 시작합니다.)';
      status.textContent = '⚠ 접속 실패: ' + detail + extra;
      startOfflineMode(team, nick);
      return;
    }
    status.textContent = '❌ 접속 실패: ' + detail + extra;
  }
}

// ═══ OFFLINE FALLBACK (no Firebase connection) ═══
function startOfflineMode(team, nick) {
  myTeam = team;
  myNick = nick;
  myRole = 0;
  currentStageIdx = 0;
  offlineMode = true;
  showScreen('screen-game');
  document.getElementById('member-list').innerHTML =
    `<div class="member-chip"><span class="member-dot" style="background:#7fdfff"></span>${escapeHtml(nick)}<span class="member-role">승무원 A (오프라인)</span></div>`;
  document.getElementById('chat-messages').innerHTML =
    `<div class="chat-msg system"><div class="msg-text">⚠ Firebase에 연결할 수 없어 오프라인 모드로 시작합니다. 1인 테스트 플레이로 모든 단서를 확인할 수 있어요. (채팅·실시간 동기화는 비활성화됩니다.)</div></div>`;
  loadStage();
}

// ═══ INIT GAME ═══
function initGame() {
  const teamRef = db.collection('teams').doc(myTeam);

  teamUnsub = teamRef.onSnapshot((snap) => {
    if (!snap.exists) return;
    const data = snap.data();

    if (data.stage !== undefined && data.stage !== currentStageIdx) {
      currentStageIdx = data.stage;
      if (currentStageIdx >= STAGES.length) {
        showFinal(data);
        return;
      }
      loadStage();
    }

    renderMembers(data.members || {});
  });

  chatUnsub = teamRef.collection('chat').orderBy('ts', 'asc')
    .onSnapshot((snap) => {
      snap.docChanges().forEach((change) => {
        if (change.type === 'added') {
          const msg = change.doc.data();
          const id = change.doc.id;
          if (!seenMsgIds.has(id)) {
            seenMsgIds.add(id);
            renderChatMsg(msg);
          }
        }
      });
    });

  teamRef.get().then((snap) => {
    const data = snap.data();
    currentStageIdx = data.stage || 0;
    if (currentStageIdx >= STAGES.length) {
      showFinal(data);
    } else {
      loadStage();
    }
    renderMembers(data.members || {});
  });
}

// ═══ LOAD STAGE ═══
function loadStage() {
  const stage = STAGES[currentStageIdx];
  document.getElementById('stage-label').textContent = stage.title;
  document.getElementById('story-box').innerHTML = stage.story;
  document.getElementById('role-badge').textContent = ROLE_NAMES[myRole];
  document.getElementById('role-badge').style.background = `rgba(${myRole===0?'127,223,255':'255,170,68'},0.15)`;
  document.getElementById('role-badge').style.color = MEMBER_COLORS[myRole];
  document.getElementById('clue-id').textContent = `단말기 — ${ROLE_NAMES[myRole]}`;
  document.getElementById('clue-text').innerHTML = stage.roleClues[myRole];
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-feedback').textContent = '';
  document.getElementById('answer-feedback').className = 'answer-feedback';

  if (stage.isOrdering) {
    document.getElementById('order-panel').style.display = 'block';
    document.getElementById('answer-panel-normal').style.display = 'none';
    renderOrderList(stage);
  } else {
    document.getElementById('order-panel').style.display = 'none';
    document.getElementById('answer-panel-normal').style.display = 'block';
  }

  startTimer(stage.timeLimit);
}

// ═══ ORDERING ═══
let currentOrder = [];
function renderOrderList(stage) {
  currentOrder = stage.orderingItems.map(it => it.id);
  shuffleArray(currentOrder);
  drawOrderList(stage);
  document.getElementById('order-feedback').textContent = '';
  document.getElementById('order-feedback').className = 'answer-feedback';
}
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
function drawOrderList(stage) {
  const list = document.getElementById('order-list');
  list.innerHTML = '';
  currentOrder.forEach((id, idx) => {
    const item = stage.orderingItems.find(it => it.id === id);
    const div = document.createElement('div');
    div.className = 'order-card';
    div.draggable = true;
    div.dataset.id = id;
    div.innerHTML = `<span class="order-num">${idx+1}</span><span class="order-handle">⠿</span><span>${item.text}</span>`;
    div.addEventListener('dragstart', () => div.classList.add('dragging'));
    div.addEventListener('dragend', () => { div.classList.remove('dragging'); syncOrderFromDOM(stage); });
    div.addEventListener('dragover', (e) => {
      e.preventDefault();
      const dragging = list.querySelector('.dragging');
      if (!dragging || dragging === div) return;
      const rect = div.getBoundingClientRect();
      const after = (e.clientY - rect.top) > rect.height / 2;
      list.insertBefore(dragging, after ? div.nextSibling : div);
    });
    list.appendChild(div);
  });
}
function syncOrderFromDOM(stage) {
  const cards = document.querySelectorAll('#order-list .order-card');
  currentOrder = Array.from(cards).map(c => c.dataset.id);
  cards.forEach((c, idx) => { c.querySelector('.order-num').textContent = idx + 1; });
}
async function submitOrder() {
  const stage = STAGES[currentStageIdx];
  const feedback = document.getElementById('order-feedback');
  const correct = JSON.stringify(currentOrder) === JSON.stringify(stage.correctOrder);

  if (correct) {
    feedback.textContent = '✅ 순서가 정확합니다!';
    feedback.className = 'answer-feedback right';
    showClearOverlay(stage);
    if (offlineMode) {
      currentStageIdx++;
      return;
    }
    await systemChat(`🎉 ${myNick}님 팀이 실험 순서를 정확히 배열했습니다!`);
    const teamRef = db.collection('teams').doc(myTeam);
    await teamRef.update({ stage: currentStageIdx + 1, stageStartTime: Date.now() });
  } else {
    feedback.textContent = '❌ 순서가 맞지 않습니다. B의 규칙 메모를 다시 들어보세요!';
    feedback.className = 'answer-feedback wrong';
    if (!offlineMode) {
      await systemChat(`❌ ${myNick}님 팀이 순서를 제출했지만 틀렸습니다. 다시 시도하세요.`);
    }
  }
}

// ═══ TIMER ═══
function startTimer(seconds) {
  clearInterval(timerInterval);
  timeLeft = seconds;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft < 0) timeLeft = 0;
    updateTimerDisplay();
    if (timeLeft <= 0) clearInterval(timerInterval);
  }, 1000);
}
function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  const el = document.getElementById('timer');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('low', timeLeft <= 30);
}

// ═══ SUBMIT ANSWER ═══
async function submitAnswer() {
  const input = document.getElementById('answer-input');
  const feedback = document.getElementById('answer-feedback');
  const raw = input.value.trim();
  const normalized = raw.toLowerCase().replace(/\s+/g, '');
  const stage = STAGES[currentStageIdx];

  const correct = stage.answers.some(a => a.toLowerCase().replace(/\s+/g, '') === normalized);

  if (correct) {
    feedback.textContent = '✅ 정답입니다!';
    feedback.className = 'answer-feedback right';
    showClearOverlay(stage);

    if (offlineMode) {
      currentStageIdx++;
      return;
    }
    await systemChat(`🎉 ${myNick}님이 정답을 맞췄습니다! "${raw}"`);
    const teamRef = db.collection('teams').doc(myTeam);
    await teamRef.update({ stage: currentStageIdx + 1, stageStartTime: Date.now() });
  } else {
    feedback.textContent = '❌ 다시 시도해보세요. 팀원과 상의했나요?';
    feedback.className = 'answer-feedback wrong';
    if (!offlineMode) {
      await systemChat(`❌ ${myNick}님이 "${raw}"를 입력했지만 오답이었습니다.`);
    }
  }
}

// ═══ CLEAR OVERLAY ═══
function showClearOverlay(stage) {
  document.getElementById('ol-icon').textContent = stage.clearIcon;
  document.getElementById('ol-title').textContent = stage.clearTitle;
  document.getElementById('ol-sub').textContent = stage.clearSub;
  document.getElementById('ol-fact').innerHTML = stage.fact;

  const twistEl = document.getElementById('ol-twist');
  if (stage.twist) {
    twistEl.style.display = 'block';
    twistEl.innerHTML = stage.twist;
  } else {
    twistEl.style.display = 'none';
  }

  const btn = document.getElementById('btn-next');
  btn.textContent = (currentStageIdx + 1 >= STAGES.length) ? '탈출 완료 ▶' : '다음 구역 진입 ▶';

  document.getElementById('overlay-clear').classList.add('active');
}

function nextStage() {
  document.getElementById('overlay-clear').classList.remove('active');
  if (offlineMode) {
    if (currentStageIdx >= STAGES.length) {
      showFinal({ members: { [myNick]: { role: 0 } } });
    } else {
      loadStage();
    }
  }
}

// ═══ MEMBERS ═══
function renderMembers(members) {
  const list = document.getElementById('member-list');
  list.innerHTML = '';
  Object.entries(members).forEach(([nick, info]) => {
    const div = document.createElement('div');
    div.className = 'member-chip';
    const color = MEMBER_COLORS[info.role] || '#7fdfff';
    div.innerHTML = `<span class="member-dot" style="background:${color}"></span>${nick}<span class="member-role">${ROLE_NAMES[info.role]}</span>`;
    list.appendChild(div);
  });
}

// ═══ CHAT ═══
function renderChatMsg(msg) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg' + (msg.system ? ' system' : '');

  if (msg.system) {
    div.innerHTML = `<div class="msg-text">${escapeHtml(msg.text)}</div>`;
  } else {
    const color = MEMBER_COLORS[msg.role] || '#7fdfff';
    div.innerHTML = `
      <div class="msg-meta">
        <span style="color:${color}; font-weight:700;">${escapeHtml(msg.author)} (${ROLE_NAMES[msg.role] || ''})</span>
      </div>
      <div class="msg-text">${escapeHtml(msg.text)}</div>`;
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  if (offlineMode) {
    renderChatMsg({ author: myNick, role: myRole, text: text, system: false });
    return;
  }
  await db.collection('teams').doc(myTeam).collection('chat').add({
    author: myNick, role: myRole, text: text, system: false, ts: firebase.firestore.FieldValue.serverTimestamp()
  });
}

async function systemChat(text) {
  await db.collection('teams').doc(myTeam).collection('chat').add({
    text: text, system: true, ts: firebase.firestore.FieldValue.serverTimestamp()
  });
}

// ═══ FINAL ═══
function showFinal(data) {
  clearInterval(timerInterval);
  showScreen('screen-final');
  document.getElementById('final-team-name').textContent = `팀 ${myTeam} · MISSION COMPLETE`;
  const memberCount = Object.keys(data.members || {}).length;
  document.getElementById('final-score-box').innerHTML = `
    <div class="final-stat"><span class="stat-label">팀 코드</span><span class="stat-val">${myTeam}</span></div>
    <div class="final-stat"><span class="stat-label">승무원 수</span><span class="stat-val">${memberCount}명</span></div>
    <div class="final-stat"><span class="stat-label">클리어 구역</span><span class="stat-val">${STAGES.length} / ${STAGES.length}</span></div>
    <div class="final-stat"><span class="stat-label">결과</span><span class="stat-val">🎉 완료!</span></div>
  `;
}

// ═══ UTILS ═══
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('input-nick').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('answer-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });
document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
</script>
