<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 SECTOR-7 탈출 프로토콜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #060a0f;
  --panel: #0d1117;
  --border: #1a2a1a;
  --green: #00ff88;
  --green-dim: #00cc6688;
  --green-dark: #003322;
  --amber: #ffaa00;
  --red: #ff3344;
  --text: #c8ffd4;
  --muted: #3a5a3a;
  --font-display: 'Black Han Sans', sans-serif;
  --font-body: 'Noto Sans KR', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* scanline effect */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* SCREENS */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ═══════════════════════════════
   LOGIN SCREEN
═══════════════════════════════ */
#screen-login {
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.login-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #002a1044 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 100% 100%, #001a0833 0%, transparent 60%);
}

.login-box {
  position: relative;
  width: 100%;
  max-width: 440px;
  border: 1px solid var(--green-dim);
  border-radius: 4px;
  background: var(--panel);
  overflow: hidden;
}

.login-header {
  background: var(--green-dark);
  border-bottom: 1px solid var(--green-dim);
  padding: 28px 32px 24px;
  text-align: center;
}

.login-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--green);
  border: 1px solid var(--green-dim);
  padding: 3px 10px;
  border-radius: 2px;
  letter-spacing: 3px;
  margin-bottom: 14px;
  animation: blink-border 2s infinite;
}

@keyframes blink-border {
  0%,100% { border-color: var(--green-dim); }
  50% { border-color: var(--green); }
}

.login-title {
  font-family: var(--font-display);
  font-size: 32px;
  color: var(--green);
  text-shadow: 0 0 20px var(--green-dim);
  line-height: 1.1;
  margin-bottom: 6px;
}

.login-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}

.login-body { padding: 28px 32px; }

.field-group { margin-bottom: 20px; }

.field-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.field-input {
  width: 100%;
  background: #0a1208;
  border: 1px solid #1e3a1e;
  border-radius: 3px;
  padding: 12px 16px;
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 15px;
  outline: none;
  transition: all 0.2s;
  caret-color: var(--green);
}

.field-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 12px #00ff8822;
}

.field-input::placeholder { color: #1e3a1e; }

.field-hint {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
}

.btn-enter {
  width: 100%;
  background: var(--green-dark);
  border: 1px solid var(--green);
  color: var(--green);
  font-family: var(--font-display);
  font-size: 18px;
  padding: 14px;
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.btn-enter::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--green);
  opacity: 0;
  transition: opacity 0.2s;
}

.btn-enter:hover { box-shadow: 0 0 24px #00ff8844; }
.btn-enter:hover::after { opacity: 0.06; }
.btn-enter:active { transform: scale(0.99); }

.login-status {
  margin-top: 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--amber);
  text-align: center;
  min-height: 18px;
}

/* ═══════════════════════════════
   LOBBY SCREEN
═══════════════════════════════ */
#screen-lobby {
  padding: 0;
}

.top-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.top-bar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.signal-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse-dot 1.5s infinite;
  flex-shrink: 0;
}

@keyframes pulse-dot {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.top-title {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--green);
  letter-spacing: 1px;
}

.top-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
}

.top-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.timer-display {
  font-family: var(--font-mono);
  font-size: 22px;
  color: var(--amber);
  letter-spacing: 3px;
  min-width: 60px;
  text-align: center;
}

.timer-display.critical { color: var(--red); animation: blink-text 0.4s infinite; }

@keyframes blink-text {
  0%,100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* LOBBY LAYOUT */
.lobby-layout {
  display: grid;
  grid-template-columns: 1fr 300px;
  grid-template-rows: auto 1fr;
  gap: 0;
  flex: 1;
  min-height: 0;
}

/* STORY PANEL */
.story-panel {
  grid-column: 1;
  grid-row: 1;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 20px 24px;
}

.stage-track {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  align-items: center;
}

.stage-pip {
  width: 28px; height: 4px;
  border-radius: 2px;
  background: var(--border);
  transition: background 0.4s;
}

.stage-pip.done { background: var(--green); }
.stage-pip.active { background: var(--amber); animation: shimmer 1s infinite; }

@keyframes shimmer {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.stage-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  margin-left: 8px;
  letter-spacing: 1px;
}

.story-box {
  background: #080f0a;
  border: 1px solid var(--border);
  border-left: 3px solid var(--green-dim);
  border-radius: 3px;
  padding: 16px 18px;
  font-size: 14px;
  line-height: 1.9;
  color: #a0c8a8;
  margin-bottom: 16px;
  font-weight: 300;
}

.story-box strong { color: var(--green); font-weight: 700; }
.story-box em { color: var(--amber); font-style: normal; }

/* CLUE CARD */
.clue-section { }

.clue-header {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

.clue-card {
  background: #030d06;
  border: 1px solid #0a2a14;
  border-radius: 3px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}

.clue-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, var(--green-dim), transparent);
}

.clue-id {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--green);
  letter-spacing: 2px;
  margin-bottom: 10px;
  opacity: 0.6;
}

.clue-text {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text);
}

.clue-text .highlight {
  color: var(--green);
  font-weight: 700;
  font-family: var(--font-mono);
  background: #001a0a;
  padding: 1px 6px;
  border-radius: 2px;
}

.clue-text .warn {
  color: var(--amber);
  font-weight: 700;
}

/* ANSWER SECTION */
.answer-panel {
  grid-column: 1;
  grid-row: 2;
  border-right: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.answer-title {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.answer-row {
  display: flex;
  gap: 10px;
}

.answer-input {
  flex: 1;
  background: #0a1208;
  border: 1px solid #1e3a1e;
  border-radius: 3px;
  padding: 11px 16px;
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 16px;
  outline: none;
  transition: all 0.2s;
  caret-color: var(--green);
}

.answer-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 12px #00ff8822;
}

.btn-submit {
  background: var(--green-dark);
  border: 1px solid var(--green);
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 11px 22px;
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-submit:hover { box-shadow: 0 0 16px #00ff8833; }

.answer-feedback {
  font-family: var(--font-mono);
  font-size: 13px;
  min-height: 18px;
  padding: 0 4px;
}

.answer-feedback.correct { color: var(--green); }
.answer-feedback.wrong { color: var(--red); }

/* SIDE PANEL */
.side-panel {
  grid-column: 2;
  grid-row: 1 / 3;
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
  height: calc(100vh - 53px);
  overflow: hidden;
}

/* TEAM MEMBERS */
.members-section {
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  flex-shrink: 0;
}

.section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.member-list { display: flex; flex-direction: column; gap: 6px; }

.member-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 3px;
  background: #080f0a;
  border: 1px solid transparent;
  transition: border-color 0.2s;
}

.member-row.me { border-color: #1e3a1e; }

.member-avatar {
  width: 28px; height: 28px;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--bg);
}

.member-info { flex: 1; min-width: 0; }

.member-name {
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.member-status {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
}

.member-clue-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 2px;
  letter-spacing: 1px;
  flex-shrink: 0;
}

/* CHAT */
.chat-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 0;
}

.chat-header {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
}

.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.chat-msg {
  display: flex;
  flex-direction: column;
  gap: 3px;
  animation: msg-in 0.2s ease;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.chat-msg.system .msg-text {
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  font-style: italic;
  text-align: center;
  padding: 2px 0;
}

.msg-meta {
  display: flex;
  align-items: center;
  gap: 6px;
}

.msg-author {
  font-size: 11px;
  font-weight: 700;
}

.msg-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
}

.msg-text {
  font-size: 13px;
  line-height: 1.6;
  color: #a0c8a8;
  padding-left: 2px;
  word-break: break-word;
}

.chat-input-area {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.chat-input {
  flex: 1;
  background: #080f0a;
  border: 1px solid #1a2a1a;
  border-radius: 3px;
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
  resize: none;
  height: 36px;
}

.chat-input:focus { border-color: var(--green-dim); }
.chat-input::placeholder { color: var(--muted); }

.btn-chat {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-chat:hover { border-color: var(--green-dim); color: var(--green); }

/* STAGE CLEAR OVERLAY */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.overlay.show { display: flex; }

.overlay-box {
  background: var(--panel);
  border: 1px solid var(--green-dim);
  border-radius: 4px;
  padding: 40px 36px;
  max-width: 480px;
  width: 100%;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.overlay-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  animation: scan-line 2s infinite;
}

@keyframes scan-line {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

.overlay-icon { font-size: 52px; margin-bottom: 16px; display: block; }

.overlay-title {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--green);
  text-shadow: 0 0 20px var(--green-dim);
  margin-bottom: 8px;
}

.overlay-sub {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
  line-height: 1.6;
}

.overlay-fact {
  background: #080f0a;
  border: 1px solid var(--border);
  border-left: 3px solid var(--green-dim);
  border-radius: 3px;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.8;
  color: #8aaa90;
  text-align: left;
  margin-bottom: 24px;
}

.overlay-fact strong { color: var(--green); }

.btn-next {
  background: var(--green-dark);
  border: 1px solid var(--green);
  color: var(--green);
  font-family: var(--font-display);
  font-size: 18px;
  padding: 13px 40px;
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.2s;
}

.btn-next:hover { box-shadow: 0 0 24px #00ff8844; }

/* FINAL SCREEN */
#screen-final {
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  position: relative;
}

.final-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 50%, #001a0a44, transparent);
  pointer-events: none;
}

.final-content { position: relative; max-width: 520px; width: 100%; }

.final-icon { font-size: 64px; display: block; margin-bottom: 16px; }

.final-title {
  font-family: var(--font-display);
  font-size: 38px;
  color: var(--green);
  text-shadow: 0 0 30px var(--green-dim);
  margin-bottom: 6px;
}

.final-sub {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 32px;
}

.final-score-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 24px;
  margin-bottom: 20px;
}

.final-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
}

.final-stat:last-child { border-bottom: none; }

.stat-label { color: var(--muted); font-family: var(--font-mono); font-size: 12px; }
.stat-val { color: var(--green); font-family: var(--font-mono); font-size: 18px; }

.btn-restart {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 11px 28px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.btn-restart:hover { border-color: var(--green-dim); color: var(--green); }

/* MOBILE */
@media (max-width: 640px) {
  .lobby-layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
  }
  .story-panel { grid-column: 1; grid-row: 1; border-right: none; }
  .answer-panel { grid-column: 1; grid-row: 2; border-right: none; }
  .side-panel {
    grid-column: 1; grid-row: 3;
    height: 400px;
    border-left: none;
    border-top: 1px solid var(--border);
  }
}

/* FLICKER ANIM */
@keyframes flicker {
  0%,96%,100% { opacity: 1; }
  97% { opacity: 0.6; }
  98% { opacity: 1; }
  99% { opacity: 0.4; }
}

.login-title { animation: flicker 6s infinite; }
</style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div class="screen active" id="screen-login">
  <div class="login-bg"></div>
  <div class="login-box">
    <div class="login-header">
      <div class="login-badge">SECTOR-7 // CLASSIFIED</div>
      <div class="login-title">탈출 프로토콜</div>
      <div class="login-sub">ESCAPE PROTOCOL v2.7 — 생존자 인증 시스템</div>
    </div>
    <div class="login-body">
      <div class="field-group">
        <label class="field-label">팀 코드 (TEAM CODE)</label>
        <input class="field-input" id="input-team" placeholder="예) ALPHA" maxlength="12" autocomplete="off" spellcheck="false">
        <div class="field-hint">같은 팀 코드를 입력한 사람들이 한 팀이 돼요</div>
      </div>
      <div class="field-group">
        <label class="field-label">닉네임 (CALLSIGN)</label>
        <input class="field-input" id="input-nick" placeholder="예) 김철수" maxlength="8" autocomplete="off">
        <div class="field-hint">팀원들이 볼 내 이름이에요</div>
      </div>
      <button class="btn-enter" onclick="login()">▶ 시스템 접속</button>
      <div class="login-status" id="login-status"></div>
    </div>
  </div>
</div>

<!-- ═══════════════ GAME LOBBY ═══════════════ -->
<div class="screen" id="screen-lobby">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="signal-dot"></div>
      <div class="top-title">SECTOR-7 탈출 프로토콜</div>
      <div class="top-meta" id="top-meta">팀: — · 승무원: —</div>
    </div>
    <div class="top-right">
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">남은시간</div>

let myTeam = '';
let myNick = '';
let myColor = '';
let myClueIndex = 0;
let currentStageIdx = 0;
let timerInterval = null;
let gameStartTime = null;
let totalElapsed = 0;
let chatUnsub = null;
let teamUnsub = null;
let seenMsgIds = new Set();

// ═══ LOGIN ═══
window.login = async function() {
  const team = document.getElementById('input-team').value.trim().toUpperCase();
  const nick = document.getElementById('input-nick').value.trim();
  const status = document.getElementById('login-status');

  if (!team || !nick) {
    status.textContent = '⚠ 팀 코드와 닉네임을 모두 입력해주세요';
    return;
  }

  status.textContent = '접속 중...';

  try {
    myTeam = team;
    myNick = nick;

    const teamRef = doc(db, 'teams', team);
    const snap = await getDoc(teamRef);

    let memberIndex = 0;

    if (!snap.exists()) {
      // 새 팀 생성
      await setDoc(teamRef, {
        stage: 0,
        stageStartTime: Date.now(),
        totalElapsed: 0,
        members: { [nick]: { color: AVATAR_COLORS[0], joinedAt: Date.now() } },
        solved: false
      });
      memberIndex = 0;
    } else {
      const data = snap.data();
      const members = data.members || {};
      if (members[nick]) {
        memberIndex = Object.keys(members).indexOf(nick);
      } else {
        memberIndex = Object.keys(members).length;
        const updateObj = {};
        updateObj[`members.${nick}`] = { color: AVATAR_COLORS[memberIndex % AVATAR_COLORS.length], joinedAt: Date.now() };
        await updateDoc(teamRef, updateObj);
      }
    }

    myColor = AVATAR_COLORS[memberIndex % AVATAR_COLORS.length];
    myClueIndex = memberIndex % STAGES[0].clues.length;

    showScreen('screen-lobby');
    initGame();
    status.textContent = '';
  } catch (e) {
    status.textContent = '❌ 접속 실패: ' + e.message;
  }
};

// ═══ INIT GAME ═══
function initGame() {
  const teamRef = doc(db, 'teams', myTeam);

  teamUnsub = onSnapshot(teamRef, (snap) => {
    if (!snap.exists()) return;
    const data = snap.data();

    // sync stage
    if (data.stage !== undefined && data.stage !== currentStageIdx) {
      currentStageIdx = data.stage;
      renderStage();
    }

    // update members
    renderMembers(data.members || {});

    // check if solved
    if (data.solved && currentStageIdx >= STAGES.length - 1) {
      showFinal(data);
    }

    document.getElementById('top-meta').textContent = `팀: ${myTeam} · 승무원: ${Object.keys(data.members||{}).length}명`;
  });

  // get current stage from DB
  getDoc(doc(db, 'teams', myTeam)).then(snap => {
    if (snap.exists()) {
      currentStageIdx = snap.data().stage || 0;
      gameStartTime = snap.data().stageStartTime || Date.now();
      totalElapsed = snap.data().totalElapsed || 0;
    }
    renderStage();
    startTimer();
  });

  listenChat();
}

// ═══ RENDER STAGE ═══
function renderStage() {
  const stage = STAGES[currentStageIdx];
  if (!stage) return;

  // stage track
  const track = document.getElementById('stage-track');
  track.innerHTML = '';
  STAGES.forEach((s, i) => {
    const pip = document.createElement('div');
    pip.className = 'stage-pip' + (i < currentStageIdx ? ' done' : i === currentStageIdx ? ' active' : '');
    track.appendChild(pip);
  });
  const lbl = document.createElement('div');
  lbl.className = 'stage-label';
  lbl.textContent = stage.title;
  track.appendChild(lbl);

  // story
  document.getElementById('story-box').innerHTML = stage.story;

  // my clue
  const memberSnap = doc(db, 'teams', myTeam);
  getDoc(memberSnap).then(snap => {
    const members = snap.data()?.members || {};
    const myIndex = Object.keys(members).indexOf(myNick);
    myClueIndex = myIndex >= 0 ? myIndex % stage.clues.length : 0;
    const clue = stage.clues[myClueIndex];
    document.getElementById('clue-id').textContent = clue.id + ' — ' + myNick + '의 단서';
    document.getElementById('clue-text').innerHTML = clue.text;
  });

  // reset answer
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-feedback').textContent = '';
  document.getElementById('answer-feedback').className = 'answer-feedback';

  // restart timer
  startTimer();
}

// ═══ TIMER ═══
function startTimer() {
  clearInterval(timerInterval);
  const stage = STAGES[currentStageIdx];
  if (!stage) return;

  getDoc(doc(db, 'teams', myTeam)).then(snap => {
    const startTime = snap.data()?.stageStartTime || Date.now();
    const limit = stage.timeLimit;

    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const remaining = Math.max(0, limit - elapsed);
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      const el = document.getElementById('timer-display');
      el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
      el.className = 'timer-display' + (remaining <= 30 ? ' critical' : '');
      if (remaining === 0) {
        clearInterval(timerInterval);
        // auto skip with system message
        systemChat('⏰ 시간 초과! 다음 구역으로 강제 이동합니다...');
        setTimeout(() => advanceStage(), 2000);
      }
    }, 500);
  });
}

// ═══ SUBMIT ANSWER ═══
window.submitAnswer = function() {
  const input = document.getElementById('answer-input').value.trim().toLowerCase().replace(/\s/g, '');
  const stage = STAGES[currentStageIdx];
  const fb = document.getElementById('answer-feedback');

  if (!input) return;

  const correct = stage.answers.some(a => a.toLowerCase().replace(/\s/g, '') === input);

  if (correct) {
    fb.className = 'answer-feedback correct';
    fb.textContent = '✅ 정답! 잠금 해제 중...';
    systemChat(`🔓 ${myNick}이(가) 정답을 맞혔습니다! 구역 돌파!`);
    clearInterval(timerInterval);

    setTimeout(() => showClearOverlay(), 800);
  } else {
    fb.className = 'answer-feedback wrong';
    fb.textContent = '❌ 틀렸습니다. 팀원들과 다시 상의해보세요.';
    document.getElementById('answer-input').value = '';
    setTimeout(() => {
      fb.textContent = '';
      fb.className = 'answer-feedback';
    }, 3000);
  }
};

// ═══ CLEAR OVERLAY ═══
function showClearOverlay() {
  const stage = STAGES[currentStageIdx];
  document.getElementById('ol-icon').textContent = stage.clearIcon;
  document.getElementById('ol-title').textContent = stage.clearTitle;
  document.getElementById('ol-sub').textContent = stage.clearSub;
  document.getElementById('ol-fact').innerHTML = stage.fact;

  const isLast = currentStageIdx >= STAGES.length - 1;
  const btn = document.getElementById('btn-next');
  btn.textContent = isLast ? '🚀 탈출 완료!' : '다음 구역 진입 ▶';

  document.getElementById('overlay-clear').classList.add('show');
}

window.nextStage = async function() {
  document.getElementById('overlay-clear').classList.remove('show');
  await advanceStage();
};

async function advanceStage() {
  const teamRef = doc(db, 'teams', myTeam);
  const snap = await getDoc(teamRef);
  const data = snap.data() || {};
  const stageElapsed = Math.floor((Date.now() - (data.stageStartTime || Date.now())) / 1000);
  const newTotal = (data.totalElapsed || 0) + stageElapsed;
  const nextStage = currentStageIdx + 1;

  if (nextStage >= STAGES.length) {
    await updateDoc(teamRef, {
      solved: true,
      totalElapsed: newTotal,
      solvedAt: Date.now()
    });
  } else {
    await updateDoc(teamRef, {
      stage: nextStage,
      stageStartTime: Date.now(),
      totalElapsed: newTotal
    });
    currentStageIdx = nextStage;
    renderStage();
    systemChat(`📡 구역 ${nextStage + 1} 진입. 새 단서를 확인하세요!`);
  }
}

// ═══ MEMBERS ═══
function renderMembers(members) {
  const list = document.getElementById('member-list');
  list.innerHTML = '';
  Object.entries(members).forEach(([name, info], i) => {
    const isMe = name === myNick;
    const color = info.color || AVATAR_COLORS[i % AVATAR_COLORS.length];
    const initials = name.slice(0, 2);
    const div = document.createElement('div');
    div.className = 'member-row' + (isMe ? ' me' : '');
    div.innerHTML = `
      <div class="member-avatar" style="background:${color}">${initials}</div>
      <div class="member-info">
        <div class="member-name" style="color:${color}">${name}${isMe ? ' (나)' : ''}</div>
        <div class="member-status">접속 중</div>
      </div>
    `;
    list.appendChild(div);
  });
}

// ═══ CHAT ═══
function listenChat() {
  if (chatUnsub) chatUnsub();
  const chatRef = collection(db, 'teams', myTeam, 'chat');
  const q = query(chatRef, orderBy('ts'));
  chatUnsub = onSnapshot(q, (snap) => {
    snap.docChanges().forEach(change => {
      if (change.type === 'added') {
        const msg = change.doc.data();
        const id = change.doc.id;
        if (!seenMsgIds.has(id)) {
          seenMsgIds.add(id);
          appendChatMsg(msg);
        }
      }
    });
  });
}

function appendChatMsg(msg) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');

  if (msg.system) {
    div.className = 'chat-msg system';
    div.innerHTML = `<div class="msg-text">${msg.text}</div>`;
  } else {
    div.className = 'chat-msg';
    const ts = msg.ts?.toDate ? msg.ts.toDate() : new Date();
    const time = ts.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `
      <div class="msg-meta">
        <span class="msg-author" style="color:${msg.color||'var(--green)'}">${msg.author}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-text">${escapeHtml(msg.text)}</div>`;
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

window.sendChat = async function() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  await addDoc(collection(db, 'teams', myTeam, 'chat'), {
    author: myNick,
    color: myColor,
    text: text,
    system: false,
    ts: serverTimestamp()
  });
};

async function systemChat(text) {
  await addDoc(collection(db, 'teams', myTeam, 'chat'), {
    text: text,
    system: true,
    ts: serverTimestamp()
  });
}

// ═══ FINAL SCREEN ═══
function showFinal(data) {
  clearInterval(timerInterval);
  showScreen('screen-final');
  document.getElementById('final-team-name').textContent = `팀 ${myTeam} · MISSION COMPLETE`;
  const total = data.totalElapsed || 0;
  const m = Math.floor(total / 60);
  const s = total % 60;
  const memberCount = Object.keys(data.members || {}).length;
  document.getElementById('final-score-box').innerHTML = `
    <div class="final-stat"><span class="stat-label">팀 코드</span><span class="stat-val">${myTeam}</span></div>
    <div class="final-stat"><span class="stat-label">승무원 수</span><span class="stat-val">${memberCount}명</span></div>
    <div class="final-stat"><span class="stat-label">총 소요 시간</span><span class="stat-val">${m}분 ${s}초</span></div>
    <div class="final-stat"><span class="stat-label">클리어 스테이지</span><span class="stat-val">${STAGES.length} / ${STAGES.length}</span></div>
  `;
}

// ═══ UTILS ═══
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// enter key for login
document.getElementById('input-nick').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.login();
});
document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.submitAnswer();
});
</script>
